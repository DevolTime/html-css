<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Login</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="img/icon.png">
    <link rel="stylesheet" href="225.css">
</head>

<body>

    <!-- Botón para abrir el modal -->
    <button id="openModal" class="btn">Continuar</button>

    <!-- Estructura del modal -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>


            <div class="header">
                <div class="logo">NETFLIX</div>
            </div>

            <div class="container">
                <div class="content">
                    <h1>Ingresa tu info para iniciar sesión</h1>
                    <div class="subtitle">
                        O bien, comienza con una cuenta nueva.
                    </div>

                    <form action="">
                        <label for="login"></label>
                        <input type="text" id="login" name="login" placeholder="Email o número de celular" required>
                        <button type="submit">Continuar</button>
                    </form>

                    <!-- BOTÓN HELP -->
                    <div class="help" onclick="toggleHelp()">
                        Obtener ayuda ▼
                    </div>



                    <!-- CONTENIDO DESPLEGABLE -->
                    <div class="dropdown" id="helpMenu">
                        <a href="#">¿Olvidaste tu email o número de celular?</a>
                        <a href="#">Obtén más información sobre el inicio de sesión</a>
                    </div>

                    <div class="small">
                        Esta página está protegida por Google reCAPTCHA para comprobar que no eres un robot.
                    </div>

                </div>
            </div>

            <script>
                function toggleHelp() {
                    const menu = document.getElementById("helpMenu");
                    menu.classList.toggle("active");
                }
            </script>



        </div>
    </div>

    <script>
        // Referencias
        const modal = document.getElementById("myModal");
        const btn = document.getElementById("openModal");
        const span = document.querySelector(".close");

        // Abrir modal
        btn.onclick = () => modal.style.display = "block";

        // Cerrar modal al hacer clic en la X
        span.onclick = () => modal.style.display = "none";

        // Cerrar modal al hacer clic fuera del contenido
        window.onclick = (event) => {
            if (event.target === modal) {
                modal.style.display = "none";
            }
        };
    </script>

</body>

</html>
