    <h3>hola</h3>


    <form action="">
        <H1 class="uno">Formulario</H1>
        <fieldset>
            <legend>Informacion Personal</legend>
            <label for="name">Nombre:
                <input type="text" placeholder="Nombre" id="name">
            </label>

            <label for="lastname">Apellido:
                <input type="text" placeholder="Apellido" id="lastname">
            </label>

            <label for="date">Fecha:
                <input type="date" placeholder="Fecha" id="date">
            </label>

           <label for="tel"> telefono:
            <input type="tel" placeholder="telefono" id="tel">
           </label>
           <label for=""><h2>Animal Favorito</h2></label>
          <select name="" id="">
            <option value="">Selecciona</option>
            <option value="">Cat</option>
            <option value="">Dog</option>
            <option value="">Fox</option>
            <option value="">Bat</option>
          </select>

          <label for="file"> Subir cedula:
            <input type="file" placeholder="" id="file">
          </label>

          <textarea name="" id="Texto"> Texto </textarea>
        </fieldset>

        <fieldset>
          <legend>Dirección de vivienda</legend>

          <label for="street">Calle y número:
            <input type="text" placeholder="Ej. Av. Siempre Viva 742" id="street" name="street">
          </label>

          <label for="city">Ciudad:
            <input type="text" placeholder="Ciudad" id="city" name="city">
          </label>

          <label for="state">Estado/Provincia:
            <input type="text" placeholder="Estado/Provincia" id="state" name="state">
          </label>

          <label for="zip">Código postal:
            <input type="text" placeholder="Código postal" id="zip" name="zip">
          </label>
        </fieldset>

        <Fieldset>
            <Legend>Inicio Sesion</Legend>
            <label for="email">Correo:
                <input type="email" placeholder="Example@gmail.com" id="email">
            </label>

            <label for="password">Contraseña:
                <input type="password" placeholder="***********" id="password">
            </label>
            
            <label for="checkbox">
                <input type="checkbox" placeholder="" id="checkbox">
            </label>

             <label for="submit">
                <input type="submit" placeholder="" id="submit" class="boton">
            </label>

        </Fieldset>
    </form>
